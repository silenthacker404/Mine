<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Her Personalities 💫</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --warm1: #1a0a00;
    --warm2: #2d1200;
    --warm3: #4a1e00;
    --amber: #ffb347;
    --gold: #ffd700;
    --cream: #fff8ee;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: radial-gradient(ellipse at 50% 0%, #3d1a00 0%, #1a0800 50%, #0d0400 100%);
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Poppins', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    padding: 2rem 1rem;
  }

  /* ── Ice crystal canvas ── */
  #crystal-canvas { position: fixed; inset:0; pointer-events:none; z-index:0; }

  /* ember glow */
  body::after {
    content:'';
    position: fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,100,0,.18) 0%, transparent 70%),
      radial-gradient(ellipse 80% 30% at 50% 0%, rgba(200,80,0,.12) 0%, transparent 60%);
    pointer-events:none; z-index:1;
  }

  .page-wrap {
    position: relative; z-index: 10;
    max-width: 680px; width: 100%;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 2rem;
  }

  /* ── Photo frame ── */
  .photo-container {
    position: relative;
    display: inline-block;
    animation: entrancePhoto .9s cubic-bezier(.34,1.56,.64,1) .3s both;
  }
  @keyframes entrancePhoto {
    from { opacity:0; transform: scale(.6) rotate(-8deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }

  .photo-glow-ring {
    position:absolute; inset:-8px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #ff8c00, #ffd700, #ff4500, #ff8c00);
    animation: spinGlow 4s linear infinite;
    z-index:-1;
    filter: blur(6px);
  }
  @keyframes spinGlow { to { transform: rotate(360deg); } }

  .photo-frame {
    width: clamp(180px, 55vw, 280px);
    height: clamp(180px, 55vw, 280px);
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid rgba(255,200,100,.5);
    box-shadow: 0 0 40px rgba(255,140,0,.5), 0 0 80px rgba(255,80,0,.25);
    display: block;
    background: linear-gradient(135deg, #2d1500, #4a2200);
    position: relative; z-index:1;
  }

  /* placeholder if no photo */
  .photo-placeholder {
    width: clamp(180px, 55vw, 280px);
    height: clamp(180px, 55vw, 280px);
    border-radius: 50%;
    background: linear-gradient(135deg, #3d1a00, #5c2800);
    border: 4px solid rgba(255,200,100,.5);
    box-shadow: 0 0 40px rgba(255,140,0,.5);
    display: flex; align-items:center; justify-content:center;
    font-size: 5rem;
    position: relative; z-index:1;
  }

  /* ── Text block ── */
  .reveal-text {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,180,60,.2);
    border-radius: 1.5rem;
    padding: 2rem 1.8rem;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,.4);
    animation: slideUpFade .8s ease .9s both;
  }
  @keyframes slideUpFade { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: #ffd599;
    line-height: 1.5;
    text-shadow: 0 0 20px rgba(255,140,0,.5);
    letter-spacing: .02em;
  }

  /* ── Yes / No buttons ── */
  .btn-row {
    display: flex; gap: 1.2rem; justify-content:center; flex-wrap:wrap;
    animation: slideUpFade .8s ease 1.2s both;
  }

  .btn-yes {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: clamp(.85rem, 2.5vw, 1.05rem);
    padding: .85rem 2.4rem;
    background: linear-gradient(135deg, #ff8c00, #ffd700);
    color: #1a0800;
    border: none; border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,140,0,.5);
    transition: transform .2s, box-shadow .2s;
    animation: pulseYes 2.5s ease-in-out infinite 2s;
    text-decoration: none; display: inline-block;
  }
  .btn-yes:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 10px 30px rgba(255,140,0,.7); }
  @keyframes pulseYes { 0%,100%{box-shadow:0 6px 24px rgba(255,140,0,.5)} 50%{box-shadow:0 6px 36px rgba(255,140,0,.8),0 0 0 8px rgba(255,140,0,.12)} }

  .btn-no {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: clamp(.85rem, 2.5vw, 1.05rem);
    padding: .85rem 2.4rem;
    background: rgba(255,255,255,.12);
    color: #ffd599;
    border: 1px solid rgba(255,200,100,.3);
    border-radius: 999px;
    cursor: pointer;
    transition: transform .2s;
    position: fixed; /* will be repositioned by JS */
    z-index: 200;
  }
  .btn-no:hover { background: rgba(255,100,0,.15); }

  /* ── Crystal snowflake label ── */
  .top-label {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.8rem, 6vw, 3.2rem);
    background: linear-gradient(135deg, #ff8c00, #ffd700, #ff6b35);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter: drop-shadow(0 0 12px rgba(255,140,0,.5));
    animation: slideUpFade .7s ease .1s both;
  }
</style>
</head>
<body>

<canvas id="crystal-canvas"></canvas>

<div class="page-wrap">
  <h2 class="top-label">Ek Badmosh Insaan ✨</h2>

  <div class="photo-container">
    <div class="photo-glow-ring"></div>
    <!-- ✏️  REPLACE src with your image path -->
    <img
      src="images/24hd.png"
      alt="Bhoomi's Photo"
      class="photo-frame"
      onerror="this.style.display='none'; document.getElementById('photo-placeholder').style.display='flex';"
    />
    <div class="photo-placeholder" id="photo-placeholder" style="display:none;">🌟</div>
  </div>

  <div class="reveal-text">
    <p class="question-text">"Iss masson se badmosh ki khuch alg personalities dekhni hai ??" 😏</p>
  </div>

  <div class="btn-row">
    <a href="page3.html" class="btn-yes">✨ Haan, Bilkul! ✨</a>
  </div>

</div>

<script>
// ── Ice Crystal Canvas ──
const canvas = document.getElementById('crystal-canvas');
const ctx = canvas.getContext('2d');
let W, H, flakes = [];

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();

function randomFlake() {
  return {
    x: Math.random() * W,
    y: -20,
    size: 4 + Math.random() * 14,
    speedY: .3 + Math.random() * .9,
    speedX: (Math.random()-.5) * .5,
    alpha: .15 + Math.random() * .5,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random()-.5) * .02,
    branches: Math.floor(4 + Math.random()*3)*2,
    glowing: Math.random() > .7,
  };
}

function drawFlake(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rot);
  ctx.globalAlpha = f.alpha;
  const arms = f.branches;
  const color = f.glowing
    ? `rgba(255,${180+Math.random()*75},80,${f.alpha})`
    : `rgba(255,210,140,${f.alpha})`;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  for (let i = 0; i < arms; i++) {
    const angle = (i / arms) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(0,0);
    const ex = Math.cos(angle)*f.size, ey = Math.sin(angle)*f.size;
    ctx.lineTo(ex, ey);
    // side branches
    for (let j=1; j<=2; j++) {
      const t = j/3;
      const bx = Math.cos(angle)*f.size*t, by = Math.sin(angle)*f.size*t;
      ctx.moveTo(bx, by);
      ctx.lineTo(bx + Math.cos(angle+Math.PI/2)*f.size*.3, by + Math.sin(angle+Math.PI/2)*f.size*.3);
      ctx.moveTo(bx, by);
      ctx.lineTo(bx + Math.cos(angle-Math.PI/2)*f.size*.3, by + Math.sin(angle-Math.PI/2)*f.size*.3);
    }
    ctx.stroke();
  }
  if (f.glowing) {
    ctx.beginPath(); ctx.arc(0,0,2,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,220,120,.8)'; ctx.fill();
  }
  ctx.restore();
}

let frame=0;
function animate() {
  ctx.clearRect(0,0,W,H);
  if(frame++%25===0 && flakes.length<120) flakes.push(randomFlake());
  flakes = flakes.filter(f=>f.y<H+30);
  flakes.forEach(f=>{
    f.y+=f.speedY; f.x+=f.speedX; f.rot+=f.rotSpeed;
    drawFlake(f);
  });
  requestAnimationFrame(animate);
}
animate();

// ── Runaway No button ──
const noBtn = document.getElementById('noBtn');
// Initial random position
function placeNoBtn() {
  const margin = 80;
  noBtn.style.left = (margin + Math.random()*(innerWidth - margin*2)) + 'px';
  noBtn.style.top  = (margin + Math.random()*(innerHeight - margin*2)) + 'px';
}
placeNoBtn();

let running = false;
function runAway(btn) {
  if(running) return; running = true;
  const margin = 80;
  let tries = 0, newX, newY;
  do {
    newX = margin + Math.random()*(innerWidth - margin*2);
    newY = margin + Math.random()*(innerHeight - margin*2);
    tries++;
  } while(tries < 50 && Math.hypot(newX-parseFloat(btn.style.left||0), newY-parseFloat(btn.style.top||0)) < 120);
  btn.style.transition = 'left .25s ease, top .25s ease';
  btn.style.left = newX + 'px';
  btn.style.top  = newY + 'px';
  setTimeout(()=>{ running=false; }, 300);
}
noBtn.addEventListener('click', e=>{ e.preventDefault(); runAway(noBtn); });
</script>
</body>
</html>
