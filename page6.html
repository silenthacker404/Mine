<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gyaan Ki Battein 📚</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#d4c49a;
  min-height:100vh;
  overflow-x:hidden;
  font-family:'Poppins',sans-serif;
  position:relative;
}

#books-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ════════ GATE SCENE ════════ */
#gate-scene{
  position:fixed;inset:0;z-index:300;
  background:linear-gradient(to bottom,#87ceeb 0%,#b0e0f5 55%,#7db36a 55%,#5a8a42 100%);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.gate-cloud{
  position:absolute;background:rgba(255,255,255,.85);border-radius:50%;
  animation:cloudDrift linear infinite;
}
@keyframes cloudDrift{from{transform:translateX(-200px)}to{transform:translateX(calc(100vw + 200px))}}
#gate-scene::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:clamp(80px,20vw,180px);height:45%;
  background:linear-gradient(to top,#c8a86a,#d4b87a);
  clip-path:polygon(20% 0%,80% 0%,100% 100%,0% 100%);
}
.gate-arch{
  position:relative;width:clamp(160px,45vw,400px);height:clamp(200px,55vw,500px);
  display:flex;align-items:flex-end;justify-content:center;z-index:5;
}
.arch-top{
  position:absolute;top:0;left:0;right:0;height:50%;
  border:clamp(6px,1.5vw,14px) solid #5c3a10;border-bottom:none;
  border-radius:50% 50% 0 0;background:rgba(92,58,16,.15);
}
.arch-pillar-l,.arch-pillar-r{
  position:absolute;bottom:0;width:clamp(12px,3vw,26px);height:52%;
  background:linear-gradient(to right,#7a4f18,#5c3a10,#7a4f18);
}
.arch-pillar-l{left:0;}.arch-pillar-r{right:0;}
.school-plate{
  position:absolute;top:15%;left:50%;transform:translateX(-50%);
  background:#f5e6c0;border:3px solid #5c3a10;border-radius:6px;
  padding:.3rem .8rem;white-space:nowrap;
  font-family:'Poppins',sans-serif;font-weight:700;
  font-size:clamp(.55rem,1.8vw,1rem);color:#3d2206;letter-spacing:.05em;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.gate-door-l,.gate-door-r{
  position:absolute;bottom:0;width:calc(50% - clamp(6px,1.5vw,13px));height:52%;
  background:linear-gradient(135deg,#8b5e1a,#5c3a10,#7a4f18);
  border:clamp(2px,.5vw,4px) solid #3d2206;
  transform-origin:left center;transition:transform 1.4s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12%;overflow:hidden;
}
.gate-door-r{right:0;transform-origin:right center;background:linear-gradient(225deg,#8b5e1a,#5c3a10,#7a4f18);}
.gate-door-l::before,.gate-door-r::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent calc(50% - 1px),rgba(0,0,0,.25) calc(50% - 1px),rgba(0,0,0,.25) calc(50% + 1px),transparent calc(50% + 1px));
}
.door-knob{
  position:absolute;width:clamp(8px,2vw,16px);height:clamp(8px,2vw,16px);border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ffd700,#b8860b);box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.gate-door-l .door-knob{right:6%;}.gate-door-r .door-knob{left:6%;}
.door-bar{width:70%;height:clamp(3px,.7vw,6px);background:rgba(0,0,0,.3);border-radius:2px;}
.gate-door-l.open{transform:perspective(800px) rotateY(-110deg);}
.gate-door-r.open{transform:perspective(800px) rotateY(110deg);}
.gate-post{
  position:absolute;bottom:0;width:clamp(14px,3.5vw,30px);height:58%;
  background:linear-gradient(to right,#9e7230,#6d4a18,#9e7230);z-index:6;
}
.gate-post-l{left:0;}.gate-post-r{right:0;}
.gate-post::before{
  content:'';position:absolute;top:-clamp(6px,1.5vw,14px);left:50%;transform:translateX(-50%);
  width:140%;height:clamp(10px,2.5vw,22px);
  background:radial-gradient(ellipse at 50% 30%,#c89440,#7a5018);border-radius:40% 40% 0 0;
}
#skip-gate{
  position:absolute;bottom:5%;right:5%;z-index:10;
  font-family:'Poppins',sans-serif;font-size:.75rem;
  background:rgba(0,0,0,.2);color:rgba(0,0,0,.6);
  border:1px solid rgba(0,0,0,.2);border-radius:999px;padding:.35rem .9rem;cursor:pointer;
}

/* ════════ CLASSROOM ════════ */
#classroom{
  display:none;position:relative;z-index:10;min-height:100vh;
  background:linear-gradient(to bottom,#e8d5a0 0%,#d4c49a 60%,#c8b488 100%);
  flex-direction:column;align-items:center;
  /* no padding-bottom — button lives on board */
}
.room-walls{
  width:100%;background:linear-gradient(to bottom,#f0e0b0,#e8d0a0);
  position:relative;padding-bottom:1.5rem;
}
.room-walls::before{
  content:'';display:block;width:100%;height:clamp(6px,1.5vw,14px);
  background:repeating-linear-gradient(90deg,#8b6914 0,#8b6914 12px,#c9960a 12px,#c9960a 14px,#8b6914 14px,#8b6914 26px);
}

/* ── Blackboard ── */
.blackboard-wrap{
  width:90%;max-width:420px;
  margin:1.2rem auto 0;position:relative;
}
.blackboard{
  width:100%;
  aspect-ratio:9/15;
  background:linear-gradient(135deg,#1a3a1a,#0d2a0d,#1a3a1a);
  border:clamp(8px,2vw,16px) solid #5c3a10;border-radius:4px;
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 0 30px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.blackboard::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.015) 3px,rgba(255,255,255,.015) 4px);
  pointer-events:none;z-index:0;
}

/* chalk tray */
.chalk-tray{
  width:100%;height:clamp(8px,2vw,14px);
  background:linear-gradient(to bottom,#7a5018,#5c3a10);
  border-radius:0 0 4px 4px;
  display:flex;align-items:center;gap:.4rem;padding:0 1rem;
}
.chalk-piece{height:60%;border-radius:2px;background:#f0f0e8;opacity:.7;}

/* ── Nav dots row (below chalk tray) ── */
.vid-dots-row{
  display:flex;gap:.55rem;justify-content:center;align-items:center;
  margin-top:.6rem;min-height:16px;
}
.vid-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(92,58,16,.25);border:1.5px solid rgba(92,58,16,.4);
  cursor:pointer;transition:background .2s,box-shadow .2s;
}
.vid-dot.active{
  background:#5c3a10;
  box-shadow:0 0 8px rgba(92,58,16,.6);
}
.vid-dot:hover{background:rgba(92,58,16,.5);}

/* ── Board layers (all absolute inside .blackboard) ── */
/* title */
#board-title{
  position:absolute;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;
  font-size:clamp(1rem,4vw,2.2rem);
  color:rgba(240,240,220,.9);
  text-align:center;padding:.8rem;
  text-shadow:0 0 8px rgba(255,255,255,.15);
  line-height:1.45;opacity:0;
}
#board-title.write{animation:chalkWrite 1.2s ease .3s forwards;}
@keyframes chalkWrite{from{opacity:0;letter-spacing:-.1em}to{opacity:1;letter-spacing:.02em}}

/* video */
#board-video{
  position:absolute;
  top:5%;bottom:5%;
  left:50%;transform:translateX(-50%);
  width:auto;aspect-ratio:9/16;
  max-height:90%;
  background:#000;display:none;border-radius:2px;overflow:hidden;z-index:1;
}
#board-video video,#board-video iframe{width:100%;height:100%;object-fit:cover;border:none;}

/* final text + button — all inside the board */
#board-final{
  position:absolute;inset:0;z-index:2;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(.6rem,2vw,1.2rem);padding:1rem;
}
#board-final.show{display:flex;}

.board-final-text{
  font-family:'Caveat',cursive;
  font-size:clamp(.85rem,3.2vw,1.5rem);
  color:rgba(240,240,220,.92);
  text-align:center;line-height:1.5;
  text-shadow:0 0 8px rgba(255,255,255,.1);
  opacity:0;
}
.board-final-text.zoom-in{animation:boardZoom .8s cubic-bezier(.34,1.56,.64,1) .1s forwards;}
@keyframes boardZoom{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}

.btn-board-next{
  font-family:'Poppins',sans-serif;font-weight:700;
  font-size:clamp(.7rem,2.5vw,.95rem);
  padding:.65rem 1.8rem;
  background:linear-gradient(135deg,#5c3a10,#8b6914,#c9960a);
  color:#fff;border:none;border-radius:999px;cursor:pointer;
  box-shadow:0 4px 16px rgba(100,60,0,.45);
  transition:transform .2s;text-decoration:none;display:inline-block;
  opacity:0;
  animation:pulseBook 2.5s ease-in-out infinite;
}
.btn-board-next.show{animation:fadeIn .6s ease .8s forwards, pulseBook 2.5s ease-in-out 1.5s infinite;}
.btn-board-next:hover{transform:scale(1.06) translateY(-2px);}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulseBook{0%,100%{box-shadow:0 4px 16px rgba(100,60,0,.45)}50%{box-shadow:0 4px 24px rgba(100,60,0,.75),0 0 0 6px rgba(100,60,0,.1)}}

/* ── Students ── */
.classroom-floor{
  width:100%;background:linear-gradient(to top,#b8a070,#c8b080);
  position:relative;padding:1.2rem 0 1.5rem;perspective:400px;
}
.classroom-floor::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,0,0,.06) 39px,rgba(0,0,0,.06) 40px);
}
.student-rows{display:flex;flex-direction:column;align-items:center;gap:.7rem;padding:.4rem 1rem;}
.student-row{
  display:flex;justify-content:center;gap:clamp(8px,2.5vw,22px);
  transform:perspective(600px) rotateX(var(--rx,0deg));
}
.student-row:nth-child(1){--rx:4deg;transform-origin:bottom;}
.student-row:nth-child(2){--rx:2deg;}
.student-row:nth-child(3){--rx:0deg;}
.student{display:flex;flex-direction:column;align-items:center;gap:0;position:relative;}
.s-desk{
  width:clamp(30px,7vw,50px);height:clamp(4px,1vw,7px);
  background:linear-gradient(to bottom,#9e7230,#7a5018);border-radius:3px 3px 0 0;
}
.s-body{width:clamp(14px,3.5vw,22px);height:clamp(18px,4.5vw,28px);border-radius:4px 4px 0 0;margin-top:1px;}
.s-head{width:clamp(11px,2.8vw,17px);height:clamp(11px,2.8vw,17px);border-radius:50%;margin-bottom:1px;position:relative;}
.s-book{
  position:absolute;bottom:calc(clamp(4px,1vw,7px));left:50%;transform:translateX(-50%);
  width:clamp(11px,2.8vw,17px);height:clamp(7px,1.8vw,11px);
  background:#f5f0e0;border-radius:1px;border:1px solid rgba(0,0,0,.2);
}
.student:nth-child(odd)  .s-head{animation:headBob  2.2s ease-in-out infinite;}
.student:nth-child(even) .s-head{animation:headBob2 2.8s ease-in-out infinite .4s;}
.student:nth-child(3n)   .s-head{animation:headNod  3.1s ease-in-out infinite .8s;}
@keyframes headBob {0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
@keyframes headBob2{0%,100%{transform:rotate(2deg) translateY(-1px)}50%{transform:rotate(-2deg) translateY(1px)}}
@keyframes headNod {0%,100%{transform:rotate(0deg) translateY(0)}33%{transform:rotate(-4deg) translateY(-1px)}66%{transform:rotate(2deg) translateY(1px)}}
.student:nth-child(odd)  .s-body{animation:writeWiggle 1.4s ease-in-out infinite;}
.student:nth-child(even) .s-body{animation:writeWiggle 1.8s ease-in-out infinite .3s;}
@keyframes writeWiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(1.5deg)}75%{transform:rotate(-1deg)}}
.student.raise-hand .s-head{animation:raisedBob 2s ease-in-out infinite;}
@keyframes raisedBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.raised-arm{
  position:absolute;top:clamp(-14px,-3.5vw,-8px);left:50%;
  transform:translateX(-40%) rotate(-30deg);
  width:3px;height:clamp(12px,3vw,18px);border-radius:999px;
  transform-origin:bottom center;animation:armRaise 2s ease-in-out infinite;
}
@keyframes armRaise{0%,100%{transform:translateX(-40%) rotate(-30deg)}50%{transform:translateX(-40%) rotate(-50deg)}}

.wall-deco{position:absolute;top:1.5rem;font-size:clamp(.8rem,2.5vw,1.4rem);opacity:.4;display:flex;gap:1.5rem;}
.wall-deco-l{left:2%;}.wall-deco-r{right:2%;}
</style>
</head>
<body>

<canvas id="books-canvas"></canvas>

<!-- ═══════════════ GATE SCENE ═══════════════ -->
<div id="gate-scene">
  <div class="gate-cloud" style="width:120px;height:45px;top:12%;left:-150px;animation-duration:18s;animation-delay:0s;"></div>
  <div class="gate-cloud" style="width:180px;height:60px;top:8%;left:-220px;animation-duration:25s;animation-delay:-8s;border-radius:30px;"></div>
  <div class="gate-cloud" style="width:90px;height:35px;top:20%;left:-120px;animation-duration:20s;animation-delay:-5s;"></div>
  <div class="gate-cloud" style="width:150px;height:50px;top:5%;left:-180px;animation-duration:30s;animation-delay:-15s;border-radius:28px;opacity:.7;"></div>
  <div class="gate-arch">
    <div class="arch-top"></div>
    <div class="arch-pillar-l"></div><div class="arch-pillar-r"></div>
    <div class="gate-post gate-post-l"></div><div class="gate-post gate-post-r"></div>
    <div class="school-plate">🎓 Gyaan Mandir 🎓</div>
    <div class="gate-door-l" id="doorL">
      <div class="door-bar"></div><div class="door-bar"></div><div class="door-bar"></div>
      <div class="door-knob"></div>
    </div>
    <div class="gate-door-r" id="doorR">
      <div class="door-bar"></div><div class="door-bar"></div><div class="door-bar"></div>
      <div class="door-knob"></div>
    </div>
  </div>
  <button id="skip-gate" onclick="skipGate()">Skip →</button>
</div>

<!-- ═══════════════ CLASSROOM ═══════════════ -->
<div id="classroom">
  <div class="room-walls">
    <div class="wall-deco wall-deco-l">📐 📏 🔭</div>
    <div class="wall-deco wall-deco-r">🌍 📊 🔬</div>

    <div class="blackboard-wrap">
      <div class="blackboard" id="blackboard">
        <!-- 1. Title -->
        <div id="board-title">Gyaan Ki Battein<br/>with <span style="font-size:1.15em;">Prof. Bhoomi</span> 🎓</div>
        <!-- 2. Video -->
        <div id="board-video"></div>
        <!-- 3. Final text + next button — all on board -->
        <div id="board-final">
          <div class="board-final-text" id="finalChalkText"></div>
          <a href="page7.html" class="btn-board-next" id="boardNextBtn">Chale Dukh Pe ➡️</a>
        </div>
      </div>
      <div class="chalk-tray">
        <div class="chalk-piece" style="width:28px;background:#f5f0e0;"></div>
        <div class="chalk-piece" style="width:18px;background:#ffcccc;"></div>
        <div class="chalk-piece" style="width:22px;background:#cce8ff;"></div>
        <div class="chalk-piece" style="width:16px;background:#ffffcc;"></div>
      </div>
      <!-- Nav dots below chalk tray -->
      <div class="vid-dots-row" id="vidDotsRow"></div>
    </div>
  </div>

  <div class="classroom-floor">
    <div class="student-rows" id="studentRows"></div>
  </div>
</div>

<script>
/* ══ Falling books ══ */
const bc=document.getElementById('books-canvas');
const bx=bc.getContext('2d');
function brsz(){bc.width=innerWidth;bc.height=innerHeight;}
window.addEventListener('resize',brsz);brsz();
const BOOK_COLORS=['#8b0000','#1a3a5c','#2d5c1a','#5c3a00','#1a1a5c','#5c1a2d','#3a5c00','#5c2d1a'];
const fallers=[];
function spawnBook(){fallers.push({x:Math.random()*innerWidth,y:-80,w:18+Math.random()*28,h:24+Math.random()*36,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*.06,spd:1.2+Math.random()*2.5,color:BOOK_COLORS[Math.floor(Math.random()*BOOK_COLORS.length)],alpha:.3+Math.random()*.5});}
let bf=0;
(function booksAnim(){
  bx.clearRect(0,0,bc.width,bc.height);
  if(bf++%40===0&&fallers.length<30)spawnBook();
  for(let i=fallers.length-1;i>=0;i--){const b=fallers[i];b.y+=b.spd;b.rot+=b.rotSpd;if(b.y>innerHeight+80){fallers.splice(i,1);continue;}bx.save();bx.translate(b.x,b.y);bx.rotate(b.rot);bx.globalAlpha=b.alpha;bx.fillStyle=b.color;bx.fillRect(-b.w/2,-b.h/2,b.w,b.h);bx.fillStyle='rgba(0,0,0,.3)';bx.fillRect(-b.w/2,-b.h/2,b.w*.12,b.h);bx.fillStyle='rgba(245,240,220,.8)';bx.fillRect(b.w/2-3,-b.h/2+2,3,b.h-4);bx.fillStyle='rgba(255,255,255,.3)';bx.fillRect(-b.w*.3,-b.h*.15,b.w*.6,2);bx.fillRect(-b.w*.25,b.h*.05,b.w*.5,1.5);bx.restore();}
  bx.globalAlpha=1;requestAnimationFrame(booksAnim);
})();

/* ══ Gate ══ */
function skipGate(){openGate();}
setTimeout(openGate,1500);
function openGate(){
  document.getElementById('doorL').classList.add('open');
  document.getElementById('doorR').classList.add('open');
  setTimeout(()=>{
    const gs=document.getElementById('gate-scene');
    gs.style.transition='opacity .8s ease';gs.style.opacity='0';
    setTimeout(()=>{gs.style.display='none';startClassroom();},850);
  },1600);
}

/* ══ Students ══ */
function buildStudents(){
  const rows=document.getElementById('studentRows');
  const skins=['#f5d0a0','#e8b07a','#c8884a','#a0603a','#7a4028','#f0c090'];
  const shirts=['#3a5c8a','#5c3a8a','#8a5c3a','#3a8a5c','#8a3a5c','#5c8a3a','#2d4a6a','#6a2d4a'];
  [3,5,5,6].forEach((count,ri)=>{
    const row=document.createElement('div');row.className='student-row';
    for(let i=0;i<count;i++){
      const s=document.createElement('div');
      s.className='student'+(i===1&&ri===1?' raise-hand':'');
      const sk=skins[Math.floor(Math.random()*skins.length)];
      const sh=shirts[Math.floor(Math.random()*shirts.length)];
      s.innerHTML=`<div class="s-head" style="background:${sk};"></div><div class="s-body" style="background:${sh};"></div><div class="s-desk"><div class="s-book"></div></div>${i===1&&ri===1?`<div class="raised-arm" style="background:${sk};"></div>`:''}`;
      row.appendChild(s);
    }
    rows.appendChild(row);
  });
}

/* ══════════════════════════════
   ✏️  ADD YOUR VIDEOS HERE
══════════════════════════════ */
const CLASS_VIDEOS=[
  {type:'file', src:'36.mp4'},
  {type:'file', src:'34.mp4'},
  // {type:'youtube', id:'YOUR_YT_ID'},
];

let vidIdx=0;

/* ── Build nav dots ── */
function buildDots(){
  const row=document.getElementById('vidDotsRow');
  row.innerHTML='';
  CLASS_VIDEOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='vid-dot'+(i===vidIdx?' active':'');
    d.onclick=()=>jumpToVideo(i);
    row.appendChild(d);
  });
}

function updateDots(){
  document.querySelectorAll('.vid-dot').forEach((d,i)=>{
    d.classList.toggle('active', i===vidIdx);
  });
}

function jumpToVideo(idx){
  vidIdx=idx;
  loadVideo(idx);
}

function startClassroom(){
  document.getElementById('classroom').style.display='flex';
  buildStudents();
  buildDots();
  setTimeout(()=>{
    document.getElementById('board-title').classList.add('write');
    setTimeout(()=>loadVideo(0), 3200);
  },600);
}

function loadVideo(idx){
  vidIdx=idx;
  const bt=document.getElementById('board-title');
  const bv=document.getElementById('board-video');
  bt.style.display='none';
  bv.style.display='block';
  bv.innerHTML='';
  updateDots();
  const v=CLASS_VIDEOS[idx];
  if(v.type==='youtube'){
    bv.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
  } else {
    bv.innerHTML=`<video autoplay controls playsinline style="width:100%;height:100%;object-fit:cover;"><source src="${v.src}" type="video/mp4"/></video>`;
    bv.querySelector('video').onended=()=>{
      if(vidIdx<CLASS_VIDEOS.length-1){ vidIdx++; loadVideo(vidIdx); }
      else { showFinalText(); }
    };
  }
}

function showFinalText(){
  document.getElementById('board-video').style.display='none';
  document.getElementById('vidDotsRow').style.display='none'; // hide dots on final
  const bf=document.getElementById('board-final');
  bf.classList.add('show');
  const txt=document.getElementById('finalChalkText');
  txt.textContent='Ab Itna Sb Khcuch ek Hi Package me hai to choti-moti Problems bhi to hogi na 🧐';
  setTimeout(()=>{
    txt.classList.add('zoom-in');
    setTimeout(()=>document.getElementById('boardNextBtn').classList.add('show'), 1800);
  },200);
}
</script>
