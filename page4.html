<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>😈 The Kidnapper 😈</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}

  body {
    background:#0a0a0a;
    min-height:100vh;
    overflow-x:hidden;
    font-family:'Poppins',sans-serif;
    position:relative;
    display:flex;flex-direction:column;align-items:center;
  }

  /* dark rain atmosphere */
  #rain-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

  body::before{
    content:'';
    position:fixed;inset:0;z-index:1;
    background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 30%,rgba(0,0,0,.88) 100%);
    pointer-events:none;
  }

  /* red top strip */
  .red-flicker{
    position:fixed;top:0;left:0;right:0;height:5px;z-index:100;
    background:linear-gradient(90deg,#ff0000,#8b0000,#ff0000);
    animation:flkr .2s step-end infinite;
  }
  @keyframes flkr{0%{opacity:1}45%{opacity:.3}65%{opacity:1}85%{opacity:.1}100%{opacity:1}}

  /* ═══════════════════════
     VAN INTRO SCENE
  ═══════════════════════ */
  #van-scene{
    position:fixed;inset:0;z-index:500;
    background:#000;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  /* road surface */
  #van-scene::before{
    content:'';position:absolute;bottom:0;left:0;right:0;height:38%;
    background:linear-gradient(to top,#1c1c1c,#111);
  }
  /* road dashes */
  #van-scene::after{
    content:'';position:absolute;bottom:17%;left:0;right:0;height:4px;
    background:repeating-linear-gradient(90deg,#ffd700 0,#ffd700 40px,transparent 40px,transparent 80px);
    animation:rdScroll .35s linear infinite;
  }
  @keyframes rdScroll{from{background-position:0 0}to{background-position:-80px 0}}

  .sg{
    position:absolute;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,120,0,.1) 0%,transparent 70%);
    animation:sgPulse 2.5s ease-in-out infinite;pointer-events:none;
  }
  @keyframes sgPulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* van */
  #van{
    position:absolute;bottom:17%;
    width:clamp(200px,52vw,360px);
    left:-420px;
    animation:vanDrive 2.4s cubic-bezier(.4,0,.2,1) .5s forwards;
    filter:drop-shadow(0 6px 18px rgba(255,0,0,.35));
  }
  @keyframes vanDrive{
    0%  {left:-420px;}
    68% {left:calc(50% - 180px);}
    82% {left:calc(50% - 192px);}
    100%{left:calc(50% - 180px);}
  }

  #van-door-g{
    transform-origin:100px 120px;
    animation:doorSlide .65s ease 3s forwards;
  }
  @keyframes doorSlide{
    0%  {transform:scaleX(1);}
    100%{transform:scaleX(0);}
  }

  /* opening name */
  #van-title{
    position:absolute;top:9%;left:50%;transform:translateX(-50%);
    text-align:center;white-space:nowrap;z-index:5;
    opacity:0;
    animation:titlePop .9s cubic-bezier(.34,1.56,.64,1) 3.6s forwards;
  }
  @keyframes titlePop{from{opacity:0;transform:translateX(-50%) scale(.4) rotate(-3deg)}to{opacity:1;transform:translateX(-50%) scale(1) rotate(0deg)}}

  .van-name{
    font-family:'Great Vibes',cursive;
    font-size:clamp(2.2rem,8vw,5.5rem);
    background:linear-gradient(135deg,#ff3d00,#ff0000,#ffd700,#ff6d00);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    background-size:300%;
    filter:drop-shadow(0 0 24px rgba(255,50,0,.9));
    animation:evilShimmer 2.5s linear 4s infinite;
    display:block;
  }
  @keyframes evilShimmer{0%{background-position:0%}100%{background-position:300%}}

  .van-sub{
    font-family:'Playfair Display',serif;font-style:italic;
    font-size:clamp(.85rem,3vw,1.5rem);
    color:#ff4444;letter-spacing:.15em;text-transform:uppercase;
    text-shadow:0 0 18px rgba(255,0,0,.9);
    display:block;margin-top:.3rem;
  }

  #skip-btn{
    position:absolute;bottom:5%;right:4%;z-index:10;
    font-family:'Poppins',sans-serif;font-size:.75rem;
    background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);
    border:1px solid rgba(255,255,255,.14);border-radius:999px;
    padding:.35rem .9rem;cursor:pointer;transition:.2s;
  }
  #skip-btn:hover{background:rgba(255,50,0,.2);color:#fff;}

  /* ═══════════════════════
     MAIN CONTENT
  ═══════════════════════ */
  #main-content{
    position:relative;z-index:10;
    width:100%;max-width:420px;
    display:none;flex-direction:column;align-items:center;
    padding:4rem 1rem 7rem;gap:0;
  }

  /* ── Case card 9:16 ── */
  .case-card{
    width:100%;
    aspect-ratio:9/16;
    max-height:82vh;
    background:linear-gradient(160deg,#1c1008,#0d0800,#1a0500);
    border:2px solid rgba(255,60,0,.4);
    border-radius:14px;
    box-shadow:0 0 50px rgba(255,30,0,.25),0 0 100px rgba(255,0,0,.1),inset 0 0 30px rgba(0,0,0,.6);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1.4rem;padding:2rem 1.5rem;
    position:relative;overflow:hidden;
    opacity:0;transform:translateY(-150vh) rotate(-7deg);
  }
  .case-card::before{
    content:'TOP SECRET';
    position:absolute;top:1.2rem;right:1.2rem;
    font-family:'Poppins',sans-serif;font-size:.5rem;letter-spacing:.3em;
    color:rgba(255,60,0,.3);border:2px solid rgba(255,60,0,.25);
    padding:.2rem .45rem;border-radius:4px;transform:rotate(12deg);
  }
  .case-card::after{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(255,255,255,.018) 26px,rgba(255,255,255,.018) 27px);
    pointer-events:none;
  }

  .case-card.drop-in{animation:cDropIn .75s cubic-bezier(.22,.61,.36,1) forwards;}
  @keyframes cDropIn{
    0%  {opacity:0;transform:translateY(-150vh) rotate(-7deg);}
    60% {opacity:1;transform:translateY(14px) rotate(1.5deg);}
    78% {transform:translateY(-6px) rotate(-.4deg);}
    100%{opacity:1;transform:translateY(0) rotate(0deg);}
  }

  .case-card.drop-out{animation:cDropOut .6s cubic-bezier(.55,0,1,.45) forwards;}
  @keyframes cDropOut{
    0%  {opacity:1;transform:translateY(0) rotate(0deg);}
    25% {transform:translateY(-18px) rotate(-2deg);}
    100%{opacity:0;transform:translateY(150vh) rotate(14deg);}
  }

  .case-badge{font-family:'Poppins',sans-serif;font-size:clamp(.6rem,1.8vw,.75rem);letter-spacing:.35em;text-transform:uppercase;color:rgba(255,100,30,.7);border-bottom:1px solid rgba(255,60,0,.25);padding-bottom:.4rem;width:100%;text-align:center;}
  .case-emoji{font-size:clamp(3rem,10vw,5rem);filter:drop-shadow(0 0 14px rgba(255,80,0,.6));}
  .case-num{font-family:'Great Vibes',cursive;font-size:clamp(3rem,10vw,5.5rem);background:linear-gradient(135deg,#ff4500,#ffd700,#ff6d00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 14px rgba(255,80,0,.5));text-align:center;line-height:1;}
  .case-desc{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.82rem,3vw,1.05rem);color:rgba(255,200,150,.75);text-align:center;line-height:1.75;padding:0 .4rem;}
  .case-stamp{font-family:'Poppins',sans-serif;font-size:clamp(.9rem,3.5vw,1.3rem);font-weight:700;color:rgba(255,40,0,.6);border:3px solid rgba(255,40,0,.5);padding:.3rem 1rem;border-radius:4px;transform:rotate(-8deg);letter-spacing:.1em;text-transform:uppercase;animation:stampWob 3s ease-in-out infinite;}
  @keyframes stampWob{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(-5deg)}}

  /* video wrapper */
  .vid-wrap{
    width:100%;aspect-ratio:9/16;max-height:82vh;
    border:2px solid rgba(255,60,0,.35);border-radius:14px;overflow:hidden;
    box-shadow:0 0 40px rgba(255,30,0,.2);
    background:#000;display:none;
    animation:fadeVid .6s ease forwards;
  }
  .vid-wrap.active{display:block;}
  @keyframes fadeVid{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .vid-wrap video,.vid-wrap iframe{width:100%;height:100%;border:none;object-fit:cover;}

  /* next button for youtube */
  .btn-next{
    font-family:'Poppins',sans-serif;font-weight:600;font-size:.9rem;
    padding:.7rem 1.8rem;margin-top:1rem;
    background:rgba(255,60,0,.25);color:#ff9977;
    border:1px solid rgba(255,60,0,.4);border-radius:999px;cursor:pointer;
  }

  /* final section */
  #final-section{
    display:none;flex-direction:column;align-items:center;gap:2rem;
    text-align:center;padding:1rem;
    animation:slideUp .8s ease both;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

  .final-q{
    font-family:'Playfair Display',serif;font-style:italic;
    font-size:clamp(1.15rem,4.5vw,2rem);
    background:linear-gradient(135deg,#ff4500,#ffd700,#ff6d00);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 18px rgba(255,100,0,.55));
    line-height:1.6;
    animation:qFlicker 3s ease-in-out infinite .5s;
  }
  @keyframes qFlicker{0%,100%{filter:drop-shadow(0 0 18px rgba(255,100,0,.55))}50%{filter:drop-shadow(0 0 32px rgba(255,50,0,.95))}}

  .btn-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}

  .btn-chalo{
    font-family:'Poppins',sans-serif;font-weight:700;
    font-size:clamp(.85rem,2.5vw,1.05rem);
    padding:.9rem 2.2rem;
    background:linear-gradient(135deg,#cc0000,#ff0000,#8b0000);
    color:#fff;border:none;border-radius:999px;cursor:pointer;
    box-shadow:0 6px 24px rgba(255,0,0,.5);
    transition:transform .2s,box-shadow .2s;
    text-decoration:none;display:inline-block;
    animation:pulseChalo 2s ease-in-out infinite;
    letter-spacing:.02em;
  }
  .btn-chalo:hover{transform:scale(1.07) translateY(-2px);box-shadow:0 10px 32px rgba(255,0,0,.75);}
  @keyframes pulseChalo{0%,100%{box-shadow:0 6px 24px rgba(255,0,0,.5)}50%{box-shadow:0 6px 36px rgba(255,0,0,.85),0 0 0 8px rgba(255,0,0,.12)}}

  .btn-nahi{
    font-family:'Poppins',sans-serif;font-weight:600;
    font-size:clamp(.85rem,2.5vw,1.05rem);
    padding:.9rem 2.2rem;
    background:rgba(255,255,255,.07);color:rgba(255,200,150,.8);
    border:1px solid rgba(255,100,50,.28);border-radius:999px;cursor:pointer;
    position:fixed;z-index:400;
    transition:left .22s ease,top .22s ease;
  }
</style>
</head>
<body>

<div class="red-flicker"></div>
<canvas id="rain-canvas"></canvas>

<!-- ═══ VAN SCENE ═══ -->
<div id="van-scene">
  <div class="sg" style="top:5%;left:15%;"></div>
  <div class="sg" style="top:5%;right:15%;"></div>

  <svg id="van" viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
    <!-- van body -->
    <rect x="8" y="68" width="342" height="104" rx="14" fill="#181818" stroke="#ff3d00" stroke-width="2"/>
    <!-- cab section -->
    <rect x="240" y="38" width="112" height="94" rx="10" fill="#111" stroke="#ff3d00" stroke-width="2"/>
    <!-- windshield -->
    <rect x="258" y="46" width="72" height="52" rx="7" fill="#0a1a0d"/>
    <!-- body windows -->
    <rect x="28"  y="78" width="58" height="46" rx="5" fill="#0d1610"/>
    <rect x="100" y="78" width="58" height="46" rx="5" fill="#0d1610"/>
    <rect x="172" y="78" width="58" height="46" rx="5" fill="#0d1610"/>
    <!-- sliding door (animates) -->
    <g id="van-door-g">
      <rect x="98" y="68" width="138" height="104" rx="4" fill="#1e1e1e" stroke="#ff3d00" stroke-width="1.5"/>
      <text x="167" y="124" text-anchor="middle" font-size="26" fill="#ff4444">😈</text>
      <text x="167" y="150" text-anchor="middle" font-size="9" fill="rgba(255,80,80,.8)" font-family="monospace" letter-spacing="2">FREE CANDY</text>
      <!-- door handle -->
      <rect x="230" y="112" width="4" height="18" rx="2" fill="rgba(255,80,0,.6)"/>
    </g>
    <!-- wheels -->
    <circle cx="78"  cy="170" r="27" fill="#1a1a1a" stroke="#ff3d00" stroke-width="2.5"/>
    <circle cx="78"  cy="170" r="11" fill="#0d0d0d"/>
    <circle cx="290" cy="170" r="27" fill="#1a1a1a" stroke="#ff3d00" stroke-width="2.5"/>
    <circle cx="290" cy="170" r="11" fill="#0d0d0d"/>
    <!-- headlight -->
    <defs><filter id="hl"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <ellipse cx="352" cy="110" rx="8" ry="14" fill="#fffaaa" opacity=".9" filter="url(#hl)"/>
    <!-- exhaust -->
    <circle cx="12" cy="142" r="8"  fill="#2a2a2a" opacity=".5" style="animation:smk 1.1s ease-in-out infinite"/>
    <circle cx="4"  cy="128" r="5"  fill="#2a2a2a" opacity=".3" style="animation:smk 1.1s ease-in-out infinite .25s"/>
  </svg>

  <div id="van-title">
    <span class="van-name">Bhoomi</span>
    <span class="van-sub">⚠️ The Kidnapper ⚠️</span>
  </div>

  <button id="skip-btn" onclick="skipIntro()">Skip →</button>
</div>

<!-- ═══ MAIN CONTENT ═══ -->
<div id="main-content">
  <div id="show-area" style="width:100%;display:flex;flex-direction:column;align-items:center;"></div>

  <div id="final-section">
    <p class="final-q">
      😈 Aao ab underworld don<br/>
      <span style="font-family:'Great Vibes',cursive;font-size:1.45em;display:block;margin:.2rem 0;">Bhoomi</span>
      ke paas chale… 😈
    </p>
    <div class="btn-row">
      <a href="page5.html" class="btn-chalo">⚠️ Chaloooooo 😈</a>
    </div>
    <button class="btn-nahi" id="nahiBtn" onmouseover="flee()" onclick="flee()">😇 Nahiiii</button>
  </div>
</div>

<style>
@keyframes smk{0%,100%{transform:scale(1) translateY(0);opacity:.4}50%{transform:scale(1.5) translateY(-6px);opacity:.15}}
</style>

<script>
/* ── Rain ── */
const rc=document.getElementById('rain-canvas');
const rx=rc.getContext('2d');
function rsz(){rc.width=innerWidth;rc.height=innerHeight;}
window.addEventListener('resize',rsz);rsz();
const drops=Array.from({length:200},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,len:10+Math.random()*22,spd:5+Math.random()*9,a:.06+Math.random()*.18}));
(function rain(){rx.clearRect(0,0,rc.width,rc.height);drops.forEach(d=>{d.y+=d.spd;if(d.y>rc.height){d.y=-d.len;d.x=Math.random()*rc.width;}rx.strokeStyle=`rgba(180,120,70,${d.a})`;rx.lineWidth=1;rx.beginPath();rx.moveTo(d.x,d.y);rx.lineTo(d.x+2,d.y+d.len);rx.stroke();});requestAnimationFrame(rain);})();

/* ── Skip ── */
function skipIntro(){fade(document.getElementById('van-scene'),()=>launchMain());}
function fade(el,cb){el.style.transition='opacity .6s ease';el.style.opacity='0';setTimeout(()=>{el.style.display='none';cb&&cb();},650);}

/* Auto flow:
   0.5s start + 2.4s drive = 2.9s arrive
   + 0.65s door = 3.55s
   + 0.9s title in = 4.45s
   hold 3.2s → fade at 7.6s */
setTimeout(()=>fade(document.getElementById('van-scene'),launchMain), 7600);

function launchMain(){
  const mc=document.getElementById('main-content');
  mc.style.display='flex';
  startCases();
}

/* ════════════════════════════════════════
   ✏️  EDIT CASES + VIDEOS HERE
   videos: [{type:'file',src:'vid.mp4'}]
           [{type:'youtube',id:'VIDEO_ID'}]
════════════════════════════════════════ */
const CASES=[
  {
    num:'Case No. - 1',
    desc:'Bacchon Ko Lalchana 🎤',
    emoji:'😈',
    stamp:'WANTED 🚨',
    videos:[{type:'file',src:'26.mp4'}]
  },
  {
    num:'Case No. - 2',
    desc:'Charge: Baccha Chori Krna 😈\nBail denied.',
    emoji:'🎤',
    stamp:'GUILTY 🔴',
    videos:[{type:'file',src:'28.mp4'}]
  },
  {
    num:'Case No. - 3',
    desc:'Charge: Bacchon Ko Darana 😎\nBail denied.',
    emoji:'👑',
    stamp:'NO MERCY 🚔',
    videos:[{type:'file',src:'29.mp4'}]
  },
];

const area=document.getElementById('show-area');
let cIdx=0;

function startCases(){showCase(0);}

function showCase(i){
  cIdx=i;
  const c=CASES[i];
  const card=document.createElement('div');
  card.className='case-card';
  card.innerHTML=`
    <div class="case-badge">— Official Wanted File —</div>
    <div class="case-emoji">${c.emoji}</div>
    <div class="case-num">${c.num}</div>
    <div class="case-desc">${c.desc.replace(/\n/g,'<br/>')}</div>
    <div class="case-stamp">${c.stamp}</div>
  `;
  area.innerHTML='';
  area.appendChild(card);
  // trigger animation next frame
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.add('drop-in')));
  // hold 3.6s then drop out → video
  setTimeout(()=>{
    card.classList.remove('drop-in');
    card.classList.add('drop-out');
    setTimeout(()=>{card.remove();playVideos(i,0);},650);
  },3600);
}

function playVideos(ci,vi){
  const vids=CASES[ci].videos;
  const v=vids[vi];
  const wrap=document.createElement('div');
  wrap.className='vid-wrap active';

  if(v.type==='youtube'){
    wrap.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
    area.innerHTML='';
    area.appendChild(wrap);
    const nb=document.createElement('button');
    nb.className='btn-next';nb.textContent='Next ▶';
    nb.onclick=()=>{wrap.remove();nb.remove();onVideoEnd(ci,vi);};
    area.appendChild(nb);
  } else {
    wrap.innerHTML=`<video autoplay controls playsinline><source src="${v.src}" type="video/mp4"/></video>`;
    area.innerHTML='';
    area.appendChild(wrap);
    wrap.querySelector('video').onended=()=>{wrap.remove();onVideoEnd(ci,vi);};
  }
}

function onVideoEnd(ci,vi){
  const more=vi+1 < CASES[ci].videos.length;
  if(more){ playVideos(ci,vi+1); return; }
  const nextCase=ci+1 < CASES.length;
  if(nextCase){ showCase(ci+1); return; }
  // done!
  area.innerHTML='';
  const fin=document.getElementById('final-section');
  fin.style.display='flex';
  placeNahi();
}

/* ── Runaway Nahi ── */
const nahiBtn=document.getElementById('nahiBtn');
function placeNahi(){
  const m=80;
  nahiBtn.style.left=(m+Math.random()*(innerWidth-m*2))+'px';
  nahiBtn.style.top=(m+Math.random()*(innerHeight-m*2))+'px';
}
let fleeing=false;
function flee(){
  if(fleeing)return;fleeing=true;
  const m=80;
  nahiBtn.style.left=(m+Math.random()*(innerWidth-m*2))+'px';
  nahiBtn.style.top=(m+Math.random()*(innerHeight-m*2))+'px';
  setTimeout(()=>fleeing=false,260);
}
nahiBtn.addEventListener('click',e=>{e.preventDefault();flee();});
</script>
</body>
</html>
